services:
  kafka:
    image: apache/kafka:3.9.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,CONTROLLER://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /tmp/kafka-logs
      CLUSTER_ID: "4L6g3nShT-eMCtK3XOnQpQ"
    networks:
      - fraud-net

  cassandra:
    image: cassandra:latest
    container_name: cassandra
    ports:
      - "9042:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: FraudDetectionCluster
    networks:
      - fraud-net

  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - fraud-net

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "9002:9000"
      - "9003:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    volumes:
      - minio_data:/data
    networks:
      - fraud-net

  flink-jobmanager:
    image: flink:2.3.0
    container_name: flink-jobmanager
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      - JOB_MANAGER_RPC_ADDRESS=flink-jobmanager
    volumes:
      - ./flink-jars:/opt/flink/lib
    depends_on:
      - kafka
    networks:
      - fraud-net

  flink-taskmanager:
    image: flink:2.3.0
    container_name: flink-taskmanager
    command: taskmanager
    environment:
      - JOB_MANAGER_RPC_ADDRESS=flink-jobmanager
    volumes:
      - ./flink-jars:/opt/flink/lib
    depends_on:
      - flink-jobmanager
      - kafka
    networks:
      - fraud-net

  metrics-exporter:
    build:
      context: .
      dockerfile: Dockerfile.metrics
    container_name: metrics-exporter
    ports:
      - "8001:8001"
    environment:
      REDIS_HOST: redis
    depends_on:
      - redis
    networks:
      - fraud-net

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./src/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - metrics-exporter
    networks:
      - fraud-net

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3001:3000"
    environment:
      GF_INSTALL_PLUGINS: "grafana-piechart-panel"
    volumes:
      - ./src/monitoring/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
      - ./src/monitoring/grafana/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml
      - ./src/monitoring/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
      - cassandra
      - redis
      - minio
    networks:
      - fraud-net

volumes:
  minio_data:

networks:
  fraud-net:
    driver: bridge
